name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (server, validator, conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e ./python pytest
      - name: Bundled scenarios up to date
        run: python scripts/build_bundled.py --check
      - name: Validate example scenarios
        run: elmulator validate scenarios/
      - name: Self-test
        run: elmulator self-test
      - name: Unit tests
        run: pytest -q
        working-directory: python
      - name: Conformance (python determinism)
        run: python conformance/run_conformance.py
      - name: Serve a bundled scenario (the capability the GitHub Action wraps)
        run: |
          python -m elmulator serve p0420_basic --host 127.0.0.1 --port 0 > elm.out 2>&1 &
          for _ in $(seq 1 50); do
            port=$(grep -m1 '^LISTENING ' elm.out | awk '{print $2}' || true)
            [ -n "$port" ] && break
            sleep 0.2
          done
          python - "$port" <<'PY'
          import socket, sys
          port = int(sys.argv[1])
          with socket.create_connection(("127.0.0.1", port), timeout=5) as s:
              s.sendall(b"03\r")
              reply = b""
              while b">" not in reply:
                  reply += s.recv(4096)
          assert b"43 01 04 20" in reply, reply
          print("served bundled scenario over TCP:", reply)
          PY

  swift:
    name: Swift (build, test, conformance vs Python)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python package
        run: pip install -e ./python
      - name: Build
        run: swift build
      - name: Test (engine, BLE state machine, and the iOS CI example — no radio)
        run: swift test
      - name: Conformance (Python vs Swift, byte-for-byte)
        run: |
          swift build --product elmulator-tcp
          python conformance/run_conformance.py \
            --swift-bin .build/debug/elmulator-tcp
