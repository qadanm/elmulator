name: Publish to PyPI

# Publishes the Python package when a GitHub release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret required.
# One-time setup on PyPI: add a trusted publisher for this repo with
#   owner: qadanm   repo: elmulator   workflow: release-pypi.yml   environment: pypi
# See LAUNCH.md.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
        working-directory: python
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
